edition = 4

[agent]
name = "seller-agent"
version = "0.1.0"
description = "Bounty Scout seller. Bids on bounty-scan WANTs, verifies arbiter escrow, and delivers GitHub opportunity JSON."
summary = "TypeScript seller agent that sells live GitHub /bounty scans and settles on Solana devnet."
readme = "Competes in CoralOS for bounty-scan WANTs, delivers structured GitHub opportunity lists, settles via arbiter-gated escrow."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "seller-agent", description = "Market identity for this seller persona" }
SERVICES = { type = "string", default = "bounty,txline", description = "Inventory; primary service is bounty-scan" }
FLOOR_SOL = { type = "f64", default = 0.0004, description = "Minimum bid in SOL" }
PERSONA = { type = "string", default = "a GitHub bounty scout selling fresh zero-competition opportunity scans", description = "Bidding persona" }
SERVICE = { type = "string", default = "bounty", description = "Delivery service; bounty scan is the hackathon fork" }
GITHUB_TOKEN = { type = "string", default = "", description = "GitHub PAT for read-only bounty search (never commit)" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline for escrow deposits (seconds)" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key for live reads" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key; set LLM_PROVIDER=openai to use it" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log settlement checks" }

[runtimes.docker]
image = "seller-agent:0.1.0"
